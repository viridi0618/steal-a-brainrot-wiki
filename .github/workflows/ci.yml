name: CI

on:
  push:
    branches:
      - main
      - fix/indexing-quality-gate
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate launch gate
        if: github.ref == 'refs/heads/main'
        run: npm run validate:launch

      - name: Validate
        if: github.ref != 'refs/heads/main'
        run: npm run validate
