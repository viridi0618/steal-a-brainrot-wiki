name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Data integrity
        run: npm run check:data

      - name: Build
        run: npm run build

      - name: Link check
        run: npm run check:links

      - name: Route check
        run: npm run check:routes

      - name: Static UI check
        run: npm run check:ui

      - name: Browser interactions
        run: npm run test:e2e

      - name: Audit report
        run: npm audit || true
